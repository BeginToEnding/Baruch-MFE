project:
  root: "."
  transcripts_dir: "data/raw/transcripts"
  parsed_dir: "data/interim/parsed"
  prices_dir: "data/interim/prices"
  extraction_raw_dir: "data/interim/extraction_raw"
  extraction_json_dir: "data/interim/extraction_json"
  processed_dir: "data/processed"
  predictions_dir: "data/predictions"
  outputs_tables_dir: "outputs/tables"
  outputs_figures_dir: "outputs/figures"
  outputs_reports_dir: "outputs/reports"
  log_path: "outputs/logs/pipeline.log"

llm:
  provider: "openai"   # openai or ollama
  model_name: "gpt-5.4-mini"
  timeout: 180
  temperature: 0.1
  max_tokens: 2500
  num_ctx: 32768
  think: false
  ollama_host: "http://localhost:11434"

price:
  benchmark: "SPY"
  start_date: "2023-09-01"

target:
  window_size: 5
  use_excess: true
  use_classification: true
  classification_up_threshold: 0.01
  classification_down_threshold: -0.01

split:
  n_train_per_ticker: 6

feature:
  use_external_signals: true

model:
  retain_benchmark_return: true
  feature_exclude:
    - ticker
    - quarter
    - company
    - raw_path
    - call_date
    - entry_date
    - exit_date
    - y_raw
    - y_excess
    - y_class
    - split

  ridge_reg:
    alpha: 2.0
    random_state: 42

  rf_reg:
    n_estimators: 100
    max_depth: 2
    min_samples_leaf: 2
    min_samples_split: 4
    max_features: 1.0
    bootstrap: true
    random_state: 42
    n_jobs: -1

  xgb_reg:
    n_estimators: 100
    max_depth: 2
    learning_rate: 0.05
    subsample: 1.0
    colsample_bytree: 1.0
    reg_alpha: 0.0
    reg_lambda: 0.5
    min_child_weight: 1
    gamma: 0.0
    random_state: 42
    n_jobs: -1

  logistic_clf:
    C: 0.2
    penalty: "l2"
    solver: "lbfgs"
    class_weight: "balanced"
    max_iter: 2000
    random_state: 42
  
  rf_clf:
    n_estimators: 100
    max_depth: 2
    min_samples_leaf: 2
    min_samples_split: 4
    max_features: "sqrt"
    bootstrap: true
    class_weight: "balanced_subsample"
    random_state: 42
    n_jobs: -1

  xgb_clf:
    n_estimators: 100
    max_depth: 2
    learning_rate: 0.03
    subsample: 1.0
    colsample_bytree: 1.0
    reg_alpha: 0.0
    reg_lambda: 0.5
    min_child_weight: 3
    gamma: 0.0
    random_state: 42
    n_jobs: -1

backtest:
  greater_is_better: true
  signal_col: "y_pred"
  long_threshold: 0.0
  short_threshold: -0.0
  annualization_days: 252
